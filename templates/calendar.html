{% extends "base.html" %}

{% block content %}
<div class="card shadow-sm mt-4">
    <div class="card-body">
        <h2 class="card-title">Calendar Viewer</h2>
        <form method="post" class="row g-3">
            <div class="col-md-5">
                <label for="year" class="form-label">Year</label>
                <input type="number" class="form-control" id="year" name="year" value="2026" required>
            </div>
            <div class="col-md-5">
                <label for="month" class="form-label">Month</label>
                <input type="number" class="form-control" id="month" name="month" min="1" max="12" placeholder="1-12" required>
            </div>
            <div class="col-md-2 d-flex align-items-end">
                <button type="submit" class="btn btn-primary w-100">Show</button>
            </div>
        </form>

        {% if month_text %}
        <hr>
        <div class="bg-light p-4 border rounded">
            <pre class="mb-0" style="font-family: 'Courier New', monospace; line-height: 1.2; font-size: 1.2rem;">{{ month_text }}</pre>
        </div>
        {% endif %}
    </div>
</div>
{% endblock %}
